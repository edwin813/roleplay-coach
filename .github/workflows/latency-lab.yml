name: latency-lab

on:
  schedule:
    - cron: "0 * * * *"  # every hour on the hour
  workflow_dispatch: {}

# Default disabled until you've added the secrets and verified locally.
# To enable, set the repo variable LATENCY_LAB_ENABLED=true in repo settings.

permissions:
  contents: write

jobs:
  experiment:
    if: ${{ vars.LATENCY_LAB_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: latency-lab
      cancel-in-progress: false
    steps:
      - name: Checkout latency-lab-results branch
        uses: actions/checkout@v4
        with:
          ref: latency-lab-results
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: latency_lab/requirements.txt

      - name: Install Python deps
        run: pip install -r latency_lab/requirements.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git author
        run: |
          git config user.name "latency-lab-bot"
          git config user.email "latency-lab@users.noreply.github.com"

      - name: Run agent (one experiment)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          # Optional: write Google credentials to disk if provided
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp.json
          fi

          claude \
            --dangerously-skip-permissions \
            --print \
            "Read latency_lab/program.md and execute one experiment exactly as instructed. Then stop."

      - name: Push results
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add latency_lab/config.json latency_lab/experiments.jsonl
            git commit -m "lab: hourly run $(date -u +%Y-%m-%dT%H:%MZ)" || true
            git push origin latency-lab-results
          else
            echo "no changes to push"
          fi
